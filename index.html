<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtoZ</title>
  <style>
    /* =============================
       カスタマイズ用変数
       ここを変えるだけでサイト全体の色が変わります
    ============================= */
    :root {
      --bg:       #0d1b2a;   /* ページ背景 */
      --surface:  #112236;   /* カード背景 */
      --border:   #1e3a52;   /* 枠線 */
      --accent:   #4a9fd4;   /* アクセントカラー */
      --text:     #e8f0fa;   /* 本文テキスト */
      --muted:    #4a6a82;   /* サブテキスト */
      --grid:     rgba(255,255,255,0.03); /* グリッド線 */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* =============================
       ヘッダー
    ============================= */
    header {
      padding: 48px 48px 36px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 1px solid var(--border);
    }

    /* ロゴ画像を使う場合: <img src="logo.png" alt="AtoZ"> に差し替えてください */
    .logo-text {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
    }
    .logo-text span { color: var(--accent); }

    .header-right {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-align: right;
      line-height: 2;
      text-transform: uppercase;
    }

    /* =============================
       フィルターバー
    ============================= */
    .filter-bar {
      padding: 24px 48px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.14em;
      padding: 6px 16px;
      cursor: pointer;
      transition: all .2s;
      text-transform: uppercase;
      font-family: inherit;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 400; }

    /* =============================
       ギャラリー
    ============================= */
    .gallery-wrap { padding: 32px 48px 80px; }

    .photo-count {
      font-size: 11px;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .gallery { columns: 3; column-gap: 12px; }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      background: var(--surface);
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .photo-card img {
      width: 100%;
      display: block;
      transition: transform .5s ease, filter .5s;
      filter: brightness(0.85) saturate(0.75);
    }
    .photo-card:hover img { transform: scale(1.04); filter: brightness(1) saturate(1); }

    .photo-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 32px 16px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      opacity: 0;
      transform: translateY(4px);
      transition: opacity .3s, transform .3s;
    }
    .photo-card:hover .photo-info { opacity: 1; transform: translateY(0); }

    .photo-cat {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .photo-title { font-size: 14px; font-weight: 400; color: #fff; margin-bottom: 3px; }
    .photo-desc { font-size: 11px; color: rgba(255,255,255,0.5); line-height: 1.5; }

    .photo-card.hidden { display: none; }

    /* =============================
       ライトボックス
    ============================= */
    .lightbox-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .lightbox-bg.open { display: flex; }

    .lightbox-inner {
      max-width: 960px;
      width: 100%;
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .lightbox-inner img { flex: 1; max-height: 80vh; object-fit: contain; display: block; }

    .lightbox-meta { width: 200px; flex-shrink: 0; }
    .lb-cat { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
    .lb-title { font-size: 22px; font-weight: 400; color: var(--text); margin-bottom: 14px; line-height: 1.3; }
    .lb-desc { font-size: 12px; color: var(--muted); line-height: 1.8; padding-top: 14px; border-top: 1px solid var(--border); }

    .lb-close {
      position: absolute;
      top: 20px; right: 24px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 16px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, color .2s;
    }
    .lb-close:hover { border-color: var(--accent); color: var(--accent); }

    /* =============================
       レスポンシブ
    ============================= */
    @media (max-width: 860px) {
      .gallery { columns: 2; }
      header, .filter-bar, .gallery-wrap { padding-left: 24px; padding-right: 24px; }
    }
    @media (max-width: 540px) {
      .gallery { columns: 1; }
      .lightbox-inner { flex-direction: column; gap: 16px; }
      .lightbox-meta { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ライトボックス -->
<div class="lightbox-bg" id="lb" onclick="lbClose(event)">
  <button class="lb-close" onclick="lbClose()">✕</button>
  <div class="lightbox-inner">
    <img id="lb-img" src="" alt="">
    <div class="lightbox-meta">
      <div class="lb-cat" id="lb-cat"></div>
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-desc" id="lb-desc"></div>
    </div>
  </div>
</div>

<!-- ヘッダー -->
<header>
  <div class="logo">
    <!--
      ロゴ画像がある場合はこちらに差し替え:
      <img src="logo.png" alt="AtoZ" style="height:48px;">
    -->
    <div class="logo-text">Ato<span>Z</span></div>
  </div>
  <div class="header-right">
    Your Name<br><!-- ← 名前を変えてください -->
    Photographer<br>
    Tokyo, Japan
  </div>
</header>

<!-- フィルターバー -->
<!-- カテゴリを増やす場合: ボタンをコピーして追加 -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('all', this)">All</button>
  <button class="filter-btn" onclick="filter('landscape', this)">Landscape</button>
  <button class="filter-btn" onclick="filter('portrait', this)">Portrait</button>
  <button class="filter-btn" onclick="filter('street', this)">Street</button>
  <button class="filter-btn" onclick="filter('nature', this)">Nature</button>
</div>

<!-- ギャラリー -->
<div class="gallery-wrap">
  <div class="photo-count" id="count">— 6 photos</div>
  <div class="gallery" id="gallery">

    <!--
    写真カードの追加方法:
    このブロックをまるごとコピーして増やすだけです。

    data-category  = フィルターのカテゴリ（半角英語）
    src            = 写真のパス例: "photos/001.jpg"
    photo-cat      = 表示カテゴリ名
    photo-title    = タイトル
    photo-desc     = 説明文
    -->

    <div class="photo-card" data-category="landscape" onclick="lbOpen(this)">
      <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80" alt="山の夜明け">
      <div class="photo-info">
        <div class="photo-cat">Landscape</div>
        <div class="photo-title">山の夜明け</div>
        <div class="photo-desc">夜明け前の静寂と染まる空</div>
      </div>
    </div>

    <div class="photo-card" data-category="portrait" onclick="lbOpen(this)">
      <img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=800&q=80" alt="静かな眼差し">
      <div class="photo-info">
        <div class="photo-cat">Portrait</div>
        <div class="photo-title">静かな眼差し</div>
        <div class="photo-desc">自然光だけで切り取った表情</div>
      </div>
    </div>

    <div class="photo-card" data-category="street" onclick="lbOpen(this)">
      <img src="https://images.unsplash.com/photo-1555993539-1732b0258235?w=800&q=80" alt="雨の夜の街">
      <div class="photo-info">
        <div class="photo-cat">Street</div>
        <div class="photo-title">雨の夜の街</div>
        <div class="photo-desc">濡れた路面に滲むネオン</div>
      </div>
    </div>

    <div class="photo-card" data-category="nature" onclick="lbOpen(this)">
      <img src="https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=800&q=80" alt="苔の森">
      <div class="photo-info">
        <div class="photo-cat">Nature</div>
        <div class="photo-title">苔の森</div>
        <div class="photo-desc">深い緑に差し込む朝の光</div>
      </div>
    </div>

    <div class="photo-card" data-category="landscape" onclick="lbOpen(this)">
      <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800&q=80" alt="稜線の向こう">
      <div class="photo-info">
        <div class="photo-cat">Landscape</div>
        <div class="photo-title">稜線の向こう</div>
        <div class="photo-desc">稜線が空に溶け込む瞬間</div>
      </div>
    </div>

    <div class="photo-card" data-category="street" onclick="lbOpen(this)">
      <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=800&q=80" alt="都市の鼓動">
      <div class="photo-info">
        <div class="photo-cat">Street</div>
        <div class="photo-title">都市の鼓動</div>
        <div class="photo-desc">無数の光が織りなす夜景</div>
      </div>
    </div>

  </div>
</div>

<script>
  function filter(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    let count = 0;
    document.querySelectorAll('.photo-card').forEach(c => {
      const show = cat === 'all' || c.dataset.category === cat;
      c.classList.toggle('hidden', !show);
      if (show) count++;
    });
    document.getElementById('count').textContent = '— ' + count + ' photo' + (count !== 1 ? 's' : '');
  }

  function lbOpen(card) {
    document.getElementById('lb-img').src    = card.querySelector('img').src;
    document.getElementById('lb-img').alt    = card.querySelector('img').alt;
    document.getElementById('lb-cat').textContent   = card.querySelector('.photo-cat')?.textContent   || '';
    document.getElementById('lb-title').textContent = card.querySelector('.photo-title')?.textContent || '';
    document.getElementById('lb-desc').textContent  = card.querySelector('.photo-desc')?.textContent  || '';
    document.getElementById('lb').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function lbClose(e) {
    if (e && e.target !== document.getElementById('lb') && !e.target.classList.contains('lb-close')) return;
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') lbClose(); });
</script>
</body>
</html>
